<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuriK-Glow | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FAF7F5] min-h-screen py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl border border-stone-200 p-8 md:p-10 shadow-sm">
        <div class="border-b border-stone-100 pb-6 mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold serif-title text-stone-900">Add New Product</h2>
                <p class="text-xs text-[#8C7A6B] uppercase tracking-widest font-semibold mt-1">SuriK-Glow Management Console</p>
            </div>
            <a href="/" class="text-xs font-bold text-stone-400 hover:text-stone-600 transition">View Site</a>
        </div>

        <form action="/dashboard" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Category</label>
                    <select name="category" required class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                        <option value="skincare">Skincare</option>
                        <option value="makeup">Cosmetics</option>
                        <option value="haircare">Haircare</option>
                        <option value="perfume">Perfume</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Brand House Name</label>
                    <input type="text" name="brand" required placeholder="e.g., COSRX" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Product Full Name</label>
                    <input type="text" name="name" required placeholder="e.g., Low pH Gel Cleanser" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Price (USD)</label>
                    <input type="number" step="0.01" name="price" required placeholder="e.g., 18.00" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">FontAwesome Icon Class</label>
                    <input type="text" name="img_icon" value="fa-sparkles" placeholder="e.g., fa-leaf" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Tailwind Icon BG Color</label>
                    <input type="text" name="bg_color" value="bg-amber-50" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Tailwind Icon Color</label>
                    <input type="text" name="icon_color" value="text-amber-600" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
                </div>
            </div>

            <div class="flex items-center gap-3 bg-stone-50 p-4 rounded-xl border border-stone-200/60">
                <input type="checkbox" name="best_seller" id="best_seller" class="w-4 h-4 text-[#8C7A6B] border-stone-300 rounded focus:ring-[#8C7A6B]">
                <label for="best_seller" class="text-xs font-bold uppercase text-stone-600 cursor-pointer">Set as hourly Best Seller</label>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Key Ingredients</label>
                <input type="text" name="ingredients" placeholder="e.g., Rice Extract 30%" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Main Benefits</label>
                <textarea name="benefits" rows="3" placeholder="Describe key effects..." class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-stone-500 mb-1.5">Ideal Target Match</label>
                <input type="text" name="ideal_for" placeholder="e.g., Oily, acne-prone skin" class="w-full px-4 py-3 bg-stone-100 rounded-xl text-sm border border-transparent focus:border-[#8C7A6B]/50 outline-none transition">
            </div>

            <button type="submit" class="w-full bg-[#8C7A6B] hover:bg-[#726255] text-white font-bold py-4 rounded-xl uppercase tracking-wider text-xs shadow-md transition duration-200">
                Publish Product to Catalog
            </button>
        </form>
    </div>
</body>
</html>
